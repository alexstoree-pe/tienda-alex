<!-- ================================================== -->
<!-- MODAL Y SCRIPT EXCLUSIVO PARA CLIENTES NORMALES -->
<!-- ================================================== -->
<div id="modal-registro" class="modal-overlay" onclick="cerrarModalRegistro(event)">
    <div class="modal-content modal-cristal" onclick="event.stopPropagation()">
        
        <!-- PASO 1 -->
        <div id="paso-1">
            <h2 style="color:var(--primary);">¿Ya eres o fuiste cliente?</h2>
            <button class="btn-modal-main" style="background:rgba(255,255,255,0.1) !important; color:#fff !important; border: 1px solid rgba(255,255,255,0.2);" onclick="mostrarFormAntiguo()">SÍ, YA COMPRÉ ANTERIORMENTE</button>
            <button class="btn-modal-main" onclick="mostrarForm()">SOY NUEVO CLIENTE</button>
            <button class="btn-modal-back" onclick="cerrarModalRegistro(event)">CANCELAR</button>
        </div>
        
        <!-- FORMULARIO NUEVO CLIENTE -->
        <div id="form-datos" style="display:none;">
            <h2 style="color:var(--primary);">Registro de Pedido</h2>
            <div id="error-reg" style="color: #ff4444; font-size: 0.75rem; margin-bottom: 10px; font-weight: 600; height: 1.2rem; text-transform: uppercase;"></div>
            
            <p style="font-size: 0.8rem; margin-bottom: 10px;">Rellene sus datos personales:</p>
            <input type="text" id="reg-nom" placeholder="Nombre Completo" autocomplete="off" style="width: 100%; padding: 12px 16px; margin-bottom: 10px; border-radius: 12px; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid #333; font-family: 'Poppins'; outline: none; font-size: 0.85rem;">
            <input type="tel" id="reg-cel" placeholder="Número Celular" autocomplete="off" style="width: 100%; padding: 12px 16px; margin-bottom: 10px; border-radius: 12px; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid #333; font-family: 'Poppins'; outline: none; font-size: 0.85rem;">
            
            <!-- Aquí aparecerán los campos dinámicos de perfiles -->
            <div id="perfiles-nuevo-container"></div>
            
            <button class="btn-modal-main" onclick="enviarWhatsApp('nuevo')">FINALIZAR Y ENVIAR</button>
            <button class="btn-modal-back" onclick="volverPaso1()">← VOLVER</button>
        </div>
        
        <!-- FORMULARIO CLIENTE ANTIGUO -->
        <div id="form-antiguo" style="display:none;">
            <h2 style="color:var(--primary);">Confirmar Perfiles</h2>
            <p style="font-size: 0.8rem; margin-bottom: 15px;">Ingresa los nombres para tus accesos:</p>
            
            <!-- Aquí aparecerán los campos dinámicos de perfiles -->
            <div id="perfiles-antiguo-container"></div>
            
            <button class="btn-modal-main" onclick="enviarWhatsApp('antiguo')">FINALIZAR Y ENVIAR</button>
            <button class="btn-modal-back" onclick="volverPaso1()">← VOLVER</button>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        window.enviarPedido = function() {
            if (typeof carrito !== 'undefined' && carrito.length === 0) return;
            document.getElementById('modal-registro').style.display = 'flex';
        };
    });

    function cerrarModalRegistro(e) { 
        if(e) e.stopPropagation();
        const modal = document.getElementById('modal-registro');
        if(e && e.target.id !== 'modal-registro' && !e.target.classList.contains('btn-modal-back')) return;
        modal.style.display = 'none'; 
        volverPaso1(); 
    }
    
    function mostrarFormAntiguo() { 
        document.getElementById('paso-1').style.display = 'none'; 
        document.getElementById('form-antiguo').style.display = 'block'; 
        generarInputsPerfiles('perfiles-antiguo-container'); // <-- Llama la magia aquí
    }
    
    function mostrarForm() { 
        document.getElementById('paso-1').style.display = 'none'; 
        document.getElementById('form-datos').style.display = 'block'; 
        generarInputsPerfiles('perfiles-nuevo-container'); // <-- Llama la magia aquí
    }
    
    function volverPaso1() { 
        document.getElementById('form-datos').style.display = 'none'; 
        document.getElementById('form-antiguo').style.display = 'none'; 
        document.getElementById('paso-1').style.display = 'block';
        document.getElementById('error-reg').innerText = ""; 
    }

    // --- MAGIA: DIBUJAR CAMPOS EXACTOS SEGÚN LA CANTIDAD ---
    function generarInputsPerfiles(containerId) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        if (!carrito || carrito.length === 0) return;

        let html = '<div style="max-height: 180px; overflow-y: auto; padding-right: 5px; margin-bottom: 15px; text-align: left;">';
        
        carrito.forEach(item => {
            let cantidad = item.cantidad || 1; // Si no hay cantidad, asume 1
            for (let i = 1; i <= cantidad; i++) {
                let labelText = cantidad > 1 ? `${item.nombre} (Perfil ${i})` : `${item.nombre}`;
                html += `
                    <label class="label-dynamic" style="color: var(--primary); font-size: 0.75rem; font-weight: 700; margin-bottom: 4px; display: block; text-transform: uppercase;">${labelText}</label>
                    <input type="text" class="nombre-perfil-input-dynamic perfil-input-${containerId}" style="width: 100%; padding: 12px 16px; margin-bottom: 10px; border-radius: 12px; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid #333; font-family: 'Poppins'; outline: none; font-size: 0.85rem;" placeholder="Nombre para el perfil (Opcional)" autocomplete="off">
                `;
            }
        });
        
        html += '</div>';
        container.innerHTML = html;
    }

    // --- ENVIAR DATOS FORMATEADOS A WHATSAPP ---
    function enviarWhatsApp(tipo) {
        let nom = "";
        let cel = "";
        let errorReg = document.getElementById('error-reg');
        
        if (tipo === 'nuevo') {
            nom = document.getElementById('reg-nom').value;
            cel = document.getElementById('reg-cel').value;
            if (nom.trim() === "" || cel.trim() === "") {
                errorReg.innerText = "Por favor, completa tus datos";
                if(nom.trim() === "") document.getElementById('reg-nom').classList.add('error-shake');
                if(cel.trim() === "") document.getElementById('reg-cel').classList.add('error-shake');
                setTimeout(() => { 
                    errorReg.innerText = ""; 
                    document.getElementById('reg-nom').classList.remove('error-shake'); 
                    document.getElementById('reg-cel').classList.remove('error-shake'); 
                }, 3000);
                return; 
            }
        }

        // 1. Obtener los inputs de perfiles que se generaron
        let containerId = (tipo === 'nuevo') ? 'perfiles-nuevo-container' : 'perfiles-antiguo-container';
        let inputsPerfiles = document.querySelectorAll(`.perfil-input-${containerId}`);

        let msg = `Hola *Alex Store*, deseo contratar:\n\n`;
        let inputIndex = 0;
        
        // 2. Armar el mensaje vinculando los nombres ingresados a cada producto
        carrito.forEach(i => { 
            let cant = i.cantidad || 1;
            msg += `⭐ *${cant}x ${i.nombre}*\n`;
            if (i.manual) msg += `📝 ${i.manual}\n`;
            
            let perfilesProducto = [];
            for(let j=0; j<cant; j++){
                if(inputsPerfiles[inputIndex] && inputsPerfiles[inputIndex].value.trim() !== ""){
                    perfilesProducto.push(inputsPerfiles[inputIndex].value.trim());
                }
                inputIndex++;
            }
            
            if(perfilesProducto.length > 0) {
                msg += `👤 Perfiles: ${perfilesProducto.join(' | ')}\n`;
            }
            
            msg += `💵 Subtotal: S/ ${(i.precio * cant).toFixed(2)}\n`;
            msg += `--------------------------\n`; 
        });

        // 3. Obtener el total y los descuentos de forma ultra-segura, leyéndolo de tu botón flotante
        let totalElemento = document.getElementById('cart-total');
        let totalStr = totalElemento ? totalElemento.innerText : "";
        let labelDescuento = document.getElementById('discount-label');
        
        if (labelDescuento && labelDescuento.style.display !== 'none') {
             msg += `\n🎁 ${labelDescuento.innerText}`;
        }

        msg += `\n💰 *TOTAL A PAGAR: ${totalStr}*`;
        
        if(tipo === 'nuevo') {
            msg += `\n\n👤 Cliente: ${nom}\n📞 Cel: ${cel}`;
        } else {
            msg += `\n\n✅ *YA SOY CLIENTE*`;
        }

        window.open(`https://wa.me/51918600000?text=${encodeURIComponent(msg)}`);
        cerrarModalRegistro();
        if(typeof limpiarCarrito === 'function') limpiarCarrito();
    }
</script>
