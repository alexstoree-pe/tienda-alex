{% extends "base.html" %}

{% block content %}
<header data-aos="fade-down">
    <img src="{{ url_for('static', filename='img/logo.webp') }}" class="brand-logo">
    <h1 style="background: linear-gradient(45deg, #ff4b2b, #ff416c); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">SERVICIO IPTV</h1>
    <p style="color: #ccc; font-size: 0.9rem; margin-top: 5px;">Televisión digital de alta calidad</p>
</header>

<div class="container" style="padding-top: 0;">
    <div class="grid-botones" data-aos="zoom-in">
        <a href="{{ url_for('inicio') }}" class="btn-universal" style="background:var(--glass); color:#fff; border:1px solid var(--glass-border);"><i class="fas fa-home" style="margin-right: 5px;"></i> INICIO</a>
        <a href="#" onclick="window.history.back()" class="btn-universal" style="background:rgba(255,255,255,0.1); color:#fff;"><i class="fas fa-arrow-left" style="margin-right: 5px;"></i> VOLVER ATRÁS</a>
    </div>
</div>
    
<div class="container" id="product-container">
    <div class="category-title" data-aos="fade-right" style="border-left-color: #ff4b2b; color: #ff4b2b;"><i class="fas fa-tv"></i> PLANES IPTV Y FLUJO TV</div>

    <!-- PEGA AQUÍ TUS TARJETAS DE IPTV -->

</div>
{% endblock %}
