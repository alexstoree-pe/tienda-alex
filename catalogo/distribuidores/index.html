<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distribución | Alex Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d4ff;
            --secondary: #0055ff;
            --dark: #0a0a0a;
            --card-bg: #161616;
            --whatsapp: #25d366;
            --text-gray: #aaa;
            --danger: #ff0000;
            --vip: #d4af37;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark);
            color: white;
            line-height: 1.6;
            padding-bottom: 120px;
        }

        header {
            background: linear-gradient(135deg, #111, #222);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 3px solid var(--primary);
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        header h1 { font-size: 2.8rem; font-weight: 700; color: var(--primary); }

        .container { padding: 20px 15px; max-width: 600px; margin: auto; }

        .nav-buttons {
            text-align: center; 
            margin: 20px 0; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            align-items: center;
        }

        .btn-vip {
            text-decoration: none; 
            width: 85%; 
            max-width: 400px;
            background: linear-gradient(135deg, #d4af37, #f4d03f); 
            color: black; 
            padding: 12px; 
            border-radius: 25px; 
            font-weight: 800; 
            font-size: 1.0rem; 
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            display: inline-block;
        }

        .btn-back {
            color: #aaa; 
            text-decoration: none; 
            font-size: 1.0rem; 
            border: 1px solid #333; 
            padding: 5px 15px; 
            border-radius: 20px;
            transition: 0.3s;
            cursor: pointer;
            background: none;
        }
        .btn-back:hover { border-color: var(--primary); color: var(--primary); }

        .service-link { text-decoration: none; color: inherit; display: block; margin-bottom: 12px; transition: 0.3s; }
        .service-card { background: var(--card-bg); border-radius: 18px; padding: 15px; display: flex; align-items: center; border: 1px solid #222; gap: 15px; }
        .service-card:hover { border-color: var(--primary); background: #1f1f1f; transform: translateY(-2px); }
        .service-logo { width: 65px; height: 65px; object-fit: cover; border-radius: 12px; flex-shrink: 0; }
        .service-text { flex-grow: 1; }
        .service-text h3 { font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
        .manual-desc { font-size: 0.8rem; color: var(--text-gray); line-height: 1.4; display: block; }
        .price-container { text-align: right; flex-shrink: 0; min-width: 80px; }
        .price-tag { color: var(--primary); font-weight: 700; font-size: 1.1rem; display: block; }

        .service-link.agotado { pointer-events: none; opacity: 0.7; }
        .service-link.agotado .service-logo, .service-link.agotado .service-text { filter: grayscale(1); }
        .service-link.agotado .precio-prod { display: none; }
        .service-link.agotado .price-container::after {
            content: "AGOTADO"; color: var(--danger); font-weight: 1000; font-size: 0.85rem;
            display: block; border: 1px solid var(--danger); padding: 2px 6px; border-radius: 6px;
            background: rgba(455, 0, 0, 0.3);
        }

        .category-title {
            margin: 25px 0 12px; font-size: 1.1rem; font-weight: 700; color: #fff;
            background: var(--secondary); padding: 6px 15px; border-radius: 20px;
            display: inline-block; text-transform: uppercase;
        }

        /* --- ESTILOS DEL MODAL PERSONALIZADO --- */
        .modal-pass {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 3000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #1a1a1a; padding: 30px; border-radius: 20px; width: 90%;
            max-width: 350px; border: 1px solid var(--primary); text-align: center;
        }
        #input-pass {
            width: 100%; padding: 12px; margin: 20px 0; border-radius: 10px;
            border: 1px solid #444; background: #000; color: white;
            text-align: center; font-size: 1.2rem; letter-spacing: 4px;
        }
        .btn-enter { background: var(--primary); color: #000; width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; }

        .floating-btn {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--whatsapp); color: white; padding: 18px;
            border-radius: 50px; text-decoration: none; font-weight: 700;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4); z-index: 100;
            width: 85%; max-width: 400px; text-align: center;
        }
    </style>
</head>
<body>

<header>
    <h1>SOLO DISTRIBUIDORES 🚀</h1>
    <p style="font-size: 1.0rem; opacity: 0.8;">Alex Store • Precios Especiales</p>
</header>

<div class="container">
    <div class="nav-buttons">
        <a href="../distribuidores-promos" class="btn-vip">👑 VER PROMOCIONES MAYORISTAS</a>
        <button onclick="abrirModalClientes()" class="btn-back">⬅ Catálogo Clientes</button>
    </div>

    <div class="category-title">👤 ZONA PERFILES</div>
    <a href="#" target="_blank" class="service-link">
        <div class="service-card">
            <img src="../img/disneys.png" class="service-logo">
            <div class="service-text">
                <h3 class="nombre-prod">Disney standar Perfil</h3>
                <span class="manual-desc">• Sin ESPN • Calidad 4K • PIN privado.</span>
            </div>
            <div class="price-container"><span class="price-tag precio-prod">S/ 4</span></div>
        </div>
    </a>
</div>

<div id="modal-password" class="modal-pass">
    <div class="modal-content">
        <h2 style="color:var(--primary); font-size: 1.2rem;">Volver al Catálogo</h2>
        <p style="font-size: 0.8rem; color: #aaa; margin-top: 10px;">Ingresa el código para salir de la Zona VIP</p>
        <input type="password" id="input-pass" placeholder="****">
        <button class="btn-enter" onclick="validarSalida()">CONFIRMAR</button>
        <button onclick="cerrarModalClientes()" style="background:none; border:none; color:grey; width:100%; margin-top:10px; cursor:pointer;">Cancelar</button>
    </div>
</div>

<a href="https://wa.me/51918600000?text=Hola%20Alex%20Store,%20soy%20Distribuidor" target="_blank" class="floating-btn">
    📲 CONTACTAR SOPORTE WHATSAPP
</a>

<script>
    // --- LÓGICA DEL MODAL ---
    function abrirModalClientes() {
        document.getElementById('modal-password').style.display = 'flex';
        document.getElementById('input-pass').value = "";
        document.getElementById('input-pass').focus();
    }

    function cerrarModalClientes() {
        document.getElementById('modal-password').style.display = 'none';
    }

    function validarSalida() {
        const passCorrecta = "ALEX2026";
        const passIngresada = document.getElementById('input-pass').value;

        if (passIngresada === passCorrecta) {
            window.location.href = "../"; // Te lleva al catálogo principal
        } else {
            alert("❌ Código incorrecto");
            document.getElementById('input-pass').value = "";
        }
    }

    // Enter para validar
    document.getElementById('input-pass').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') { validarSalida(); }
    });

    // --- CONFIGURACIÓN WHATSAPP ORIGINAL ---
    function configurarLinksWhatsApp() {
        const telefono = "51918600000";
        const tarjetas = document.querySelectorAll('.service-link:not(.agotado)');
        tarjetas.forEach(tarjeta => {
            const nombre = tarjeta.querySelector('.nombre-prod')?.innerText;
            const precio = tarjeta.querySelector('.precio-prod')?.innerText;
            if (nombre && precio) {
                const mensaje = `Hola Alex Store, soy Distribuidor. Deseo ${nombre} (${precio})`;
                tarjeta.href = `https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`;
            }
        });
    }
    window.onload = configurarLinksWhatsApp;
</script>

</body>
</html>
