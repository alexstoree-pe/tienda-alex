<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promociones | Alex Store</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ffcc00; 
            --secondary: #ff6600; 
            --dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --whatsapp: #25d366;
            --danger-bright: #ff3333;
        }

        html { display: none; background-color: var(--dark); scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top right, #0a0a0a, #050505);
            color: white;
            line-height: 1.6;
            padding-bottom: 140px;
        }

        header {
            background: rgba(255, 204, 0, 0.9);
            backdrop-filter: blur(15px);
            padding: 45px 20px;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 10px 30px rgba(255, 204, 0, 0.2);
            color: #000;
            position: sticky;
            top: 0;
            z-index: 2000;
        }

        header h1 { font-size: 2.2rem; font-weight: 800; text-transform: uppercase; }

        .container { padding: 20px 15px; max-width: 600px; margin: auto; }

        .back-nav { text-align: left; margin-bottom: 25px; }
        .back-btn {
            display: inline-block;
            color: #888;
            text-decoration: none;
            font-size: 0.8rem;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            padding: 10px 20px;
            border-radius: 15px;
        }

        /* --- TÍTULOS DE CATEGORÍA ULTRA LLAMATIVOS --- */
        .category-title {
            margin: 45px 0 20px; 
            font-size: 1.1rem; 
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 12px;
            /* Degradado de alto contraste */
            background: linear-gradient(to right, #ffffff, var(--primary), #ff6600);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(255,204,0,0.4));
        }

        .category-title::before {
            content: '';
            width: 5px;
            height: 24px;
            background: var(--primary);
            border-radius: 10px;
            box-shadow: 0 0 15px var(--primary);
        }

        /* --- TARJETAS PREMIUM --- */
        .promo-link { text-decoration: none; color: inherit; display: block; margin-bottom: 18px; }
        
        .promo-card {
            background: var(--glass);
            border-radius: 25px;
            padding: 20px;
            display: flex;
            align-items: center;
            border: 1px solid var(--glass-border);
            gap: 15px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-height: 110px;
        }

        .promo-card:hover {
            border-color: var(--primary);
            background: rgba(255, 204, 0, 0.05);
            transform: scale(1.02);
        }

        .service-logo {
            width: 70px; height: 70px;
            object-fit: cover;
            border-radius: 18px;
            flex-shrink: 0;
            border: 1px solid var(--glass-border);
        }

        .service-text { flex: 1; min-width: 0; }
        .service-text h3 { font-size: 1.1rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
        .manual-desc { font-size: 0.8rem; color: #999; }

        /* --- CORRECCIÓN DEFINITIVA: CENTRADO DE BOTÓN --- */
        .price-container { 
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center; /* Centra horizontalmente */
            width: 120px; /* Ancho fijo para consistencia */
            margin-left: 10px;
        }

        .price-tag { 
            color: #000; background: var(--primary);
            padding: 8px 0; border-radius: 12px;
            font-weight: 800; font-size: 1.1rem;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.2);
        }

        /* --- PARPADEO SIN STOCK --- */
        @keyframes shine-red {
            0% { text-shadow: 0 0 5px #ff0000; color: #ff3333; border-color: #ff3333; }
            50% { text-shadow: 0 0 20px #ff0000, 0 0 30px #ff0000; color: #ffffff; border-color: #ffffff; }
            100% { text-shadow: 0 0 5px #ff0000; color: #ff3333; border-color: #ff3333; }
        }

        .promo-link.agotado { pointer-events: none; }
        .promo-link.agotado .service-logo { filter: grayscale(1); opacity: 0.4; }
        .promo-link.agotado .service-text { opacity: 0.6; }
        .promo-link.agotado .price-tag { display: none !important; }

        /* Botón Sin Stock con centrado total */
        .promo-link.agotado .price-container::after {
            content: "SIN STOCK";
            font-size: 0.75rem;
            font-weight: 900;
            border: 2px solid var(--danger-bright);
            padding: 8px 0;
            border-radius: 10px;
            background: rgba(255, 0, 0, 0.1);
            animation: shine-red 1.5s infinite;
            display: block;
            width: 100%; 
            text-align: center;
        }

        /* MODAL SEGURIDAD */
        .modal-pass { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px);
            z-index: 3000; justify-content: center; align-items: flex-end; 
        }
        .modal-content { 
            background: #111; padding: 40px 25px; border-radius: 35px 35px 0 0; 
            width: 100%; max-width: 500px; border-top: 2px solid var(--primary); text-align: center;
        }

        #input-pass { 
            width: 100%; padding: 18px; margin: 25px 0; border-radius: 15px; border: 1px solid #333; 
            background: #000; color: var(--primary); text-align: center; font-size: 1.6rem; letter-spacing: 6px; 
        }
        .btn-acceso { 
            display: block; width: 100%; padding: 18px; border-radius: 18px; border: none; 
            background: var(--primary); color: #000; font-weight: 800; cursor: pointer;
        }

        .floating-btn {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(135deg, #25d366, #128c7e);
            color: white; padding: 20px; border-radius: 25px;
            text-decoration: none; font-weight: 800; width: 90%; max-width: 450px;
            text-align: center; z-index: 1000; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
    </style>

    <script>
        (function() {
            const acceso = sessionStorage.getItem("acceso_concedido");
            if (acceso === "true") {
                document.documentElement.style.display = "block";
            } else {
                document.addEventListener("DOMContentLoaded", function() {
                    document.documentElement.style.display = "block";
                    const container = document.querySelector('.container');
                    const header = document.querySelector('header');
                    if(container) container.style.display = 'none';
                    if(header) header.style.display = 'none';
                    abrirSeguridadPromos();
                });
            }
        })();

        function abrirSeguridadPromos() {
            const modal = document.getElementById('modal-password');
            if (modal) {
                modal.style.display = 'flex';
                document.getElementById('input-pass').focus();
            }
        }
    </script>
</head>
<body>

<header>
    <h1 data-aos="fade-down">COMBOS OFERTAS ⚡</h1>
    <p>Alex Store • Máximo ahorro garantizado</p>
</header>

<div class="container">
    <div class="back-nav" data-aos="fade-right">
        <a href="../clientes/" class="back-btn">⬅ VOLVER AL CATÁLOGO</a>
    </div>

    <div class="category-title" data-aos="fade-right">🔥 COMBOS MÁS PEDIDOS</div>

    <a href="#" class="promo-link " data-aos="fade-up">
        <div class="promo-card">
            <img src="../img/combo1.png" class="service-logo">
            <div class="service-text">
                <h3 class="nombre-prod">Combo Cine Pro</h3>
                <span class="manual-desc">Netflix + Disney • Ambos 4K Ultra HD.</span>
            </div>
            <div class="price-container">
                <span class="price-tag precio-prod">S/ 22</span>
            </div>
        </div>
    </a>

    <div class="category-title" data-aos="fade-right">🕒 PROMOCIONES INDIVIDUALES</div>

    <a href="#" class="promo-link agotado" data-aos="fade-up">
        <div class="promo-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" class="service-logo">
            <div class="service-text">
                <h3 class="nombre-prod">Spotify Premium</h3>
                <span class="manual-desc">Plan trimestral • Sin anuncios.</span>
            </div>
            <div class="price-container">
                <span class="price-tag precio-prod">S/ 18</span>
            </div>
        </div>
    </a>
</div>

<a href="https://wa.me/51918600000?text=Hola%20Alex%20Store,%20quiero%20consultar%20promos" target="_blank" class="floating-btn" data-aos="zoom-in">
    📲 CONSULTAR DISPONIBILIDAD
</a>

<div id="modal-password" class="modal-pass">
    <div class="modal-content">
        <h2 style="color:var(--primary); font-weight: 800;">ACCESO PRIVADO</h2>
        <input type="password" id="input-pass" placeholder="****">
        <button class="btn-acceso" onclick="validarPassPromos()">ENTRAR A OFERTAS</button>
        <button onclick="window.location.href='../clientes/'" style="background:none; border:none; color:#444; width:100%; margin-top:25px; cursor:pointer;">Regresar</button>
    </div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({ duration: 800, once: true });

    function validarPassPromos() {
        const input = document.getElementById('input-pass');
        if (input.value === "cliente") {
            sessionStorage.setItem("acceso_concedido", "true");
            location.reload();
        } else {
            input.style.borderColor = "red";
            input.value = "";
            setTimeout(() => { input.style.borderColor = "#333"; }, 1500);
        }
    }

    document.getElementById('input-pass').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') validarPassPromos();
    });

    function configurarLinksWhatsApp() {
        const telefono = "51918600000";
        document.querySelectorAll('.promo-link:not(.agotado)').forEach(tarjeta => {
            const nombre = tarjeta.querySelector('.nombre-prod')?.innerText;
            const precio = tarjeta.querySelector('.precio-prod')?.innerText;
            if (nombre && precio) {
                tarjeta.href = `https://wa.me/${telefono}?text=Hola Alex Store, quiero la PROMO: ${nombre} (${precio})`;
                tarjeta.target = "_blank";
            }
        });
    }
    window.onload = configurarLinksWhatsApp;
</script>
</body>
</html>
