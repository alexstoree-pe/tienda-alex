<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alex Store | Acceso Autorizado</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d4ff;
            --secondary: #0055ff;
            --dark: #050505;
            --card-bg: rgba(20, 20, 20, 0.8);
            --vip: #d4af37;
            --success: #25d366;
            --danger: #ff4b2b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .main-container {
            width: 100%;
            max-width: 650px;
            padding: 40px;
            background: var(--card-bg);
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .logo-section { margin-bottom: 40px; }
        .logo-section h1 {
            font-size: clamp(2.5rem, 10vw, 3.5rem);
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
            text-transform: uppercase;
            filter: drop-shadow(0 0 15px rgba(0, 212, 255, 0.3));
        }

        /* --- SECCIONES AMPLIADAS --- */
        .section-wrapper {
            margin-bottom: 40px;
            text-align: left;
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 20px;
            padding-left: 15px;
            text-transform: uppercase;
            border-left: 4px solid;
        }

        .title-clientes { color: var(--primary); border-color: var(--primary); }
        .title-distribuidor { color: var(--vip); border-color: var(--vip); }

        .buttons-grid { 
            display: grid; 
            grid-template-columns: 1fr; /* Una sola columna para que ocupen todo el ancho */
            gap: 20px; 
        }

        .btn-access {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 35px 25px; /* Más acolchado para que se vean grandes */
            border-radius: 20px;
            font-weight: 700;
            font-size: 1.2rem; /* Texto más grande */
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.03);
            color: white;
            cursor: pointer;
            text-decoration: none;
            width: 100%;
        }

        .btn-access span { font-size: 2rem; }

        .btn-access:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        /* Efectos de brillo en hover */
        .btn-clients:hover { border-bottom: 4px solid var(--primary); }
        .btn-promos-c:hover { border-bottom: 4px solid var(--success); }
        .btn-dist:hover { border-bottom: 4px solid var(--vip); }
        .btn-promos-d:hover { border-bottom: 4px solid var(--danger); }

        /* MODAL DE SEGURIDAD */
        .modal-pass {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #000;
            padding: 40px 30px;
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(0, 212, 255, 0.5);
            text-align: center;
        }

        #pass-input {
            width: 100%;
            padding: 16px;
            margin: 20px 0;
            border-radius: 15px;
            border: 1px solid #222;
            background: #111;
            color: #fff;
            text-align: center;
            font-size: 1.8rem;
            letter-spacing: 8px;
            outline: none;
        }

        .btn-confirm {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: white; width: 100%; padding: 16px; border: none;
            border-radius: 15px; font-weight: 700; cursor: pointer;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.2s ease-in-out 0s 2; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="logo-section">
        <h1>ALEX STORE</h1>
        <p style="color:#666; font-size:0.8rem; letter-spacing:4px; font-weight: 600;">PREMIUM SERVICES</p>
    </div>

    <div class="section-wrapper">
        <h3 class="section-title title-clientes">ZONA CLIENTES</h3>
        <div class="buttons-grid">
            <div onclick="solicitarAcceso('clientes/')" class="btn-access btn-clients">
                <span>🛒</span> Catálogo Clientes
            </div>
            <div onclick="solicitarAcceso('promociones-clientes/')" class="btn-access btn-promos-c">
                <span>🎁</span> Promociones Clientes
            </div>
        </div>
    </div>

    <div class="section-wrapper" style="margin-bottom: 0;">
        <h3 class="section-title title-distribuidor">ZONA DISTRIBUIDOR</h3>
        <div class="buttons-grid">
            <div onclick="solicitarAcceso('distribuidores/')" class="btn-access btn-dist">
                <span>👤</span> Zona Distribudior
            </div>
            <div onclick="solicitarAcceso('distribuidores-promos/')" class="btn-access btn-promos-d">
                <span>👑</span> Promo Distribuidores
            </div>
        </div>
    </div>
</div>

<div id="modal-pass" class="modal-pass">
    <div class="modal-content" id="modal-box">
        <h2 id="modal-titulo">ACCESO</h2>
        <p id="modal-desc" style="color: #666; margin-top: 5px;"></p>
        <input type="password" id="pass-input" placeholder="****" maxlength="12">
        <div id="error-msg" style="color:var(--danger); font-size:0.8rem; margin-bottom:10px; display:none;">❌ CÓDIGO INCORRECTO</div>
        <button class="btn-confirm" onclick="validar()">VERIFICAR</button>
        <button style="background:none; border:none; color:#555; margin-top:20px; cursor:pointer;" onclick="cerrar()">CANCELAR</button>
    </div>
</div>

<script>
    let urlDestino = "";

    window.onload = function() {
        sessionStorage.removeItem("acceso_concedido");
        sessionStorage.removeItem("acceso_distribuidor");
    };

    function solicitarAcceso(url) {
        urlDestino = url;
        const modal = document.getElementById('modal-pass');
        const titulo = document.getElementById('modal-titulo');
        const desc = document.getElementById('modal-desc');
        
        document.getElementById('error-msg').style.display = "none";
        
        if (url.includes('distribuidores')) {
            titulo.style.color = "#d4af37";
            titulo.innerText = "Acceso Distribuidor";
            desc.innerText = "Solo para socios estratégicos";
        } else {
            titulo.style.color = "#00d4ff";
            titulo.innerText = "ÁREA CLIENTES";
            desc.innerText = "Ingrese su código de acceso";
        }

        modal.style.display = 'flex';
        document.getElementById('pass-input').value = "";
        document.getElementById('pass-input').focus();
    }

    function cerrar() { document.getElementById('modal-pass').style.display = 'none'; }

    function validar() {
        const input = document.getElementById('pass-input');
        const pass = input.value;
        const error = document.getElementById('error-msg');
        const modalBox = document.getElementById('modal-box');
        
        const CLAVE_CLIENTES = "cliente";
        const CLAVE_DISTRIBUIDORES = "dis"; 
        
        let esRutaMayorista = urlDestino.includes('distribuidores');
        let claveCorrecta = esRutaMayorista ? CLAVE_DISTRIBUIDORES : CLAVE_CLIENTES;

        if (pass === claveCorrecta) {
            sessionStorage.setItem("acceso_concedido", "true");
            if (esRutaMayorista) sessionStorage.setItem("acceso_distribuidor", "true");
            input.style.borderColor = "#25d366";
            setTimeout(() => { window.location.href = urlDestino; }, 300);
        } else {
            error.style.display = "block";
            modalBox.classList.add('shake');
            input.value = "";
            input.focus();
            setTimeout(() => { modalBox.classList.remove('shake'); }, 300);
        }
    }

    document.getElementById('pass-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') validar();
    });
</script>

</body>
</html>
