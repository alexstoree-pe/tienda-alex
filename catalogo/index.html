<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alex Store | Enlaces Oficiales</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d4ff;
            --secondary: #0055ff;
            --dark: #050505;
            --card-bg: #121212;
            --vip: #d4af37;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .main-container {
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .logo-section {
            margin-bottom: 40px;
        }

        .logo-section h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .logo-section p {
            font-size: 0.9rem;
            color: #888;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .buttons-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-link {
            display: block;
            text-decoration: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            border: 1px solid #222;
            background: var(--card-bg);
            color: white;
            cursor: pointer;
        }

        .btn-link:hover {
            transform: translateY(-3px);
            border-color: var(--primary);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.2);
        }

        /* Botones Especiales */
        .btn-clients { border-left: 5px solid var(--primary); }
        .btn-promos { border-left: 5px solid #25d366; }
        .btn-distributors { border-left: 5px solid var(--vip); color: var(--vip); }

        /* MODAL DE SEGURIDAD */
        .modal-pass {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #111;
            padding: 30px;
            border-radius: 20px;
            width: 85%;
            max-width: 350px;
            border: 1px solid var(--vip);
            text-align: center;
        }
        .modal-content h2 { color: var(--vip); font-size: 1.2rem; margin-bottom: 10px; }
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border-radius: 10px;
            border: 1px solid #333;
            background: #000;
            color: white;
            text-align: center;
            font-size: 1.2rem;
            letter-spacing: 5px;
        }
        .btn-confirm {
            background: var(--vip);
            color: black;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
        }

        footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #444;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="logo-section">
        <h1>ALEX STORE</h1>
        <p>Soluciones Digitales & Streaming</p>
    </div>

    <div class="buttons-grid">
        <a href="clientes/" class="btn-link btn-clients">🛒 Catálogo Clientes</a>
        <a href="promociones-clientes/" class="btn-link btn-promos">🎁 Promociones Clientes</a>

        <button onclick="solicitarAcceso('distribuidores/')" class="btn-link btn-distributors">👤 Zona Distribuidores</button>
        <button onclick="solicitarAcceso('distribuidores-promos/')" class="btn-link btn-distributors">👑 Promos Distribuidores</button>
    </div>

    <footer>
        &copy; 2026 ALEX STORE. Todos los derechos reservados.
    </footer>
</div>

<div id="modal-pass" class="modal-pass">
    <div class="modal-content">
        <h2>Área Restringida</h2>
        <p style="font-size: 0.8rem; color: #666;">Solo personal autorizado</p>
        <input type="password" id="pass-input" placeholder="****">
        <button class="btn-confirm" onclick="validar()">INGRESAR</button>
        <button onclick="cerrar()" style="background:none; border:none; color:#444; margin-top:15px; cursor:pointer;">Cancelar</button>
    </div>
</div>

<script>
    let urlDestino = "";

    function solicitarAcceso(url) {
        urlDestino = url;
        document.getElementById('modal-pass').style.display = 'flex';
        document.getElementById('pass-input').value = "";
        document.getElementById('pass-input').focus();
    }

    function cerrar() {
        document.getElementById('modal-pass').style.display = 'none';
    }

    function validar() {
        const pass = document.getElementById('pass-input').value;
        if (pass === "ALEX2026") {
            window.location.href = urlDestino;
        } else {
            alert("❌ Código de acceso incorrecto");
            document.getElementById('pass-input').value = "";
        }
    }

    // Soporte para tecla Enter
    document.getElementById('pass-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') { validar(); }
    });
</script>

</body>
</html>
