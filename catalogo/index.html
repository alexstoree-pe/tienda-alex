<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alex Store | Acceso Premium</title>

    <link rel="icon" type="image/png" href="https://alexstoree-pe.github.io/tienda-alex/catalogo/img/logo.webp">

    <link rel="apple-touch-icon" href="https://alexstoree-pe.github.io/tienda-alex/catalogo/img/logo.webp">
    <meta name="apple-mobile-web-app-title" content="Alex Acceso">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#050505">

    <meta property="og:title" content="Alex Store | Acceso Premium">
    <meta property="og:description" content="Ingresa a tu panel premium y gestiona tus servicios digitales con seguridad.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://alexstoree-pe.github.io/tienda-alex/catalogo/acceso/"> 
    <meta property="og:image" content="https://alexstoree-pe.github.io/tienda-alex/catalogo/img/logo.webp">
    <meta property="og:image:width" content="500">
    <meta property="og:image:height" content="500">
    <meta property="og:image:type" content="image/webp">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d4ff;
            --secondary: #0055ff;
            --dark: #050505;
            --glass: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.1);
            --vip: #d4af37;
            --success: #25d366;
            --danger: #ff4b2b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top right, #111, #050505);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 25px;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 80% 20%, rgba(0, 212, 255, 0.05), transparent 40%);
            z-index: -1; 
            pointer-events: none;
        }

        .main-container {
            width: 100%;
            max-width: 850px;
            padding: 60px 50px;
            background: var(--glass);
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(25px);
            box-shadow: 0 50px 120px rgba(0,0,0,0.8);
            text-align: center;
            position: relative;
            z-index: 1;
        }

        /* --- ESTILOS DEL LOGO (IDEA 1) --- */
        .logo-section { 
            margin-bottom: 40px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-logo {
            width: 280px; /* Tamaño premium */
            height: auto;
            filter: drop-shadow(0 0 25px rgba(212, 175, 55, 0.3));
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .main-logo:hover {
            transform: scale(1.05);
        }

        .logo-section p {
            color: var(--primary);
            font-size: 0.9rem;
            letter-spacing: 6px;
            font-weight: 600;
            margin-top: 15px;
            text-transform: uppercase;
        }

        /* --- SEPARADORES --- */
        .zone-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin: 40px 0 25px;
            pointer-events: none;
        }

        .zone-header span {
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #555;
            white-space: nowrap;
        }

        .zone-line { height: 1px; width: 100%; background: linear-gradient(to right, var(--glass-border), transparent); }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .btn-access {
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid var(--glass-border);
            padding: 45px 35px;
            border-radius: 35px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 30px;
            text-decoration: none;
            color: #fff;
            position: relative;
            z-index: 10;
        }

        .btn-access * { pointer-events: none; } 

        .btn-access:hover {
            transform: translateY(-12px) scale(1.03);
            background: rgba(255,255,255,0.06);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn-access i { font-size: 2.8rem; transition: 0.4s; }
        .btn-info { text-align: left; }
        .btn-info strong { display: block; font-size: 1.4rem; margin-bottom: 5px; }
        .btn-info span { font-size: 0.9rem; color: #888; font-weight: 300; }

        .btn-clients i { color: var(--primary); }
        .btn-promos-c i { color: var(--success); }
        .btn-dist i { color: var(--vip); }
        .btn-promos-d i { color: var(--danger); }

        /* MODAL */
        .modal-pass {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(30px);
            z-index: 5000; justify-content: center; align-items: center;
        }
        .modal-content {
            width: 90%; max-width: 500px; text-align: center;
            background: #000; padding: 60px; border-radius: 50px;
            border: 1px solid var(--glass-border);
        }

        #pass-input {
            width: 100%; background: none; border: none;
            border-bottom: 3px solid #222; color: #fff;
            font-size: 3rem; text-align: center; padding: 25px;
            margin: 40px 0; outline: none; letter-spacing: 15px;
        }

        .btn-confirm {
            background: #fff; color: #000; padding: 22px;
            border-radius: 25px; font-weight: 800; border: none;
            width: 100%; cursor: pointer; font-size: 1.2rem;
            text-transform: uppercase;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        @media (max-width: 480px) {
            .main-logo { width: 220px; }
            .main-container { padding: 40px 20px; }
        }
    /* ... tus otros estilos ... */
    padding-top: 30px; /* Ajusta este número hasta que el logo se vea bien */
}
    </style>
</head>
<body>

<div class="main-container">
    <div class="logo-section">
        <img src="img/logo.webp" alt="Alex Store Logo" class="main-logo">
        <p>Cuentas Premium al Mejor Precio</p>
    </div>

    <div class="zone-header">
        <span>Acceso a Clientes</span>
        <div class="zone-line"></div>
    </div>
    
    <div class="buttons-grid">
        <div onclick="solicitarAcceso('clientes/')" class="btn-access btn-clients">
            <i class="fa-solid fa-store"></i>
            <div class="btn-info">
                <strong>Catálogo Completo para Clientes</strong>
                <span>Streaming, Musica y más</span>
            </div>
        </div>
        <div onclick="solicitarAcceso('promociones-clientes/')" class="btn-access btn-promos-c">
            <i class="fa-solid fa-fire"></i>
            <div class="btn-info">
                <strong>Combos de promociones </strong>
                <span>Ahorro máxima por meses </span>
            </div>
        </div>
    </div>

    <div class="zone-header" style="margin-top: 60px;">
        <span>Panel de Socios</span>
        <div class="zone-line"></div>
    </div>

    <div class="buttons-grid">
        <div onclick="solicitarAcceso('distribuidores/')" class="btn-access btn-dist">
            <i class="fa-solid fa-briefcase"></i>
            <div class="btn-info">
                <strong>Zona Distribuidor</strong>
                <span>Precios para distribuidores</span>
            </div>
        </div>
        <div onclick="solicitarAcceso('distribuidores-promos/')" class="btn-access btn-promos-d">
            <i class="fa-solid fa-crown"></i>
            <div class="btn-info">
                <strong>Promos Mayoristas</strong>
                <span>Stock limitado exclusivo de cuentas</span>
            </div>
        </div>
    </div>
</div>

<div id="modal-pass" class="modal-pass">
    <div class="modal-content" id="modal-box">
        <h2 id="modal-titulo">SEGURIDAD</h2>
        <input type="password" id="pass-input" placeholder="****" maxlength="8">
        <button class="btn-confirm" onclick="validar()">DESBLOQUEAR</button>
        <p onclick="cerrar()" style="margin-top:30px; color:#555; cursor:pointer; font-size:0.9rem;">Regresar al portal</p>
    </div>
</div>

<script>
    let urlDestino = "";

    function solicitarAcceso(url) {
        urlDestino = url;
        const modal = document.getElementById('modal-pass');
        const titulo = document.getElementById('modal-titulo');
        
        if (url.includes('distribuidores')) {
            titulo.style.color = "#d4af37";
            titulo.innerText = "PANEL MAYORISTA";
        } else {
            titulo.style.color = "#00d4ff";
            titulo.innerText = "ACCESO CLIENTE";
        }

        modal.style.display = 'flex';
        document.getElementById('pass-input').value = "";
        setTimeout(() => { document.getElementById('pass-input').focus(); }, 100);
    }

    function cerrar() { document.getElementById('modal-pass').style.display = 'none'; }

    function validar() {
        const input = document.getElementById('pass-input');
        const pass = input.value;
        const modalBox = document.getElementById('modal-box');
        
        const CLAVE_CLIENTES = "cliente";
        const CLAVE_DISTRIBUIDORES = "dis";

        let esRutaMayorista = urlDestino.includes('distribuidores');
        let claveCorrecta = esRutaMayorista ? CLAVE_DISTRIBUIDORES : CLAVE_CLIENTES;

        if (pass === claveCorrecta) {
            // Seteamos permisos para evitar doble validación
            sessionStorage.setItem("acceso_concedido", "true");
            if (esRutaMayorista) {
                sessionStorage.setItem("acceso_distribuidor", "true");
            }
            window.location.href = urlDestino;
        } else {
            modalBox.style.animation = "shake 0.3s";
            input.style.borderColor = "red";
            setTimeout(() => { 
                modalBox.style.animation = ""; 
                input.style.borderColor = "#222";
            }, 300);
            input.value = "";
        }
    }

    document.getElementById('pass-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') validar();
    });
</script>

</body>
</html>
