<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | Alex Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d4ff;
            --secondary: #0055ff;
            --dark: #0a0a0a;
            --card-bg: #161616;
            --whatsapp: #25d366;
            --text-gray: #aaa;
            --danger: #ff0000;
        }

        /* --- TUS ESTILOS ORIGINALES (Mantenidos) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--dark); color: white; line-height: 1.6; padding-bottom: 140px; }
        header { background: linear-gradient(135deg, var(--secondary), var(--primary)); padding: 40px 20px; text-align: center; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        header h1 { font-size: 3.0rem; font-weight: 700; letter-spacing: 1px; }
        header p { font-size: 1.2rem; opacity: 0.9; }
        .container { padding: 20px 15px; max-width: 600px; margin: auto; }
        .distributor-btn { background: rgba(0, 212, 255, 0.1); color: var(--primary); border: 1px dashed var(--primary); padding: 12px 25px; border-radius: 30px; text-decoration: none; font-weight: 600; font-size: 0.85rem; display: inline-block; transition: 0.3s; }
        .category-title { margin: 30px 0 15px; font-size: 1.1rem; font-weight: 700; color: var(--primary); text-transform: uppercase; display: flex; align-items: center; }
        .category-title::after { content: ""; height: 1px; background: #333; flex: 1; margin-left: 15px; }
        .main-title { display: block; text-align: center; margin: 40px 0 20px; color: #fff; border-bottom: 1px solid #333; padding-bottom: 10px; font-size: 1.3rem; }
        .service-item { cursor: pointer; display: block; margin-bottom: 12px; }
        .service-card { background: var(--card-bg); border-radius: 18px; padding: 15px; display: flex; align-items: center; border: 1px solid #222; transition: 0.3s; gap: 15px; position: relative; }
        .service-item.selected .service-card { border-color: var(--primary); background: #1a2a3a; transform: scale(1.02); }
        .service-logo { width: 65px; height: 65px; object-fit: cover; border-radius: 12px; }
        .service-text h3 { font-size: 1rem; color: #fff; }
        .price-tag { color: var(--primary); font-weight: 700; }
        .floating-btn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--whatsapp); color: white; padding: 15px; border-radius: 50px; text-decoration: none; font-weight: 700; width: 90%; max-width: 450px; text-align: center; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        .floating-btn.hidden { display: none; }

        /* --- NUEVOS ESTILOS PARA EL MODAL DE REGISTRO --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; 
            justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-content {
            background: #1a1a1a; padding: 25px; border-radius: 20px;
            width: 90%; max-width: 400px; border: 1px solid var(--primary);
            text-align: center;
        }
        .modal-content h2 { color: var(--primary); margin-bottom: 15px; font-size: 1.2rem; }
        .option-btn {
            display: block; width: 100%; padding: 12px; margin: 10px 0;
            border-radius: 10px; border: none; font-weight: 700; cursor: pointer;
            font-family: 'Poppins';
        }
        .btn-nuevo { background: var(--primary); color: #000; }
        .btn-antiguo { background: #333; color: #fff; }
        
        #form-datos { display: none; margin-top: 20px; text-align: left; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.8rem; color: var(--text-gray); margin-bottom: 5px; }
        .input-group input {
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #444;
            background: #0a0a0a; color: white; outline: none;
        }
        .btn-confirmar { background: var(--whatsapp); color: white; width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: 700; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <h1> ALEX STORE CATALOGO </h1>
    <p>Servicios Digitales • Garantía y Confianza</p>
</header>

<div class="container">
    <div class="distributor-link">
        <a href="distribuidores/" class="distributor-btn">👤 ZONA DISTRIBUIDORES</a>
    </div>

    <div class="category-title main-title">⭐ ZONA DE CLIENTES ⭐</div>

    <div class="category-title">🎬 CINE, SERIES Y ANIME</div>
    
    <div class="service-item" onclick="toggleCarrito(this)">
        <div class="service-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/ff/Netflix-new-icon.png" class="service-logo">
            <div class="service-text">
                <h3 class="nombre-prod">Netflix Premium</h3>
                <span class="manual-desc">• Premium Ultra HD • Perfil Privado • 1 perfil.</span>
            </div>
            <div class="price-container"><span class="price-tag precio-prod">S/ 16</span></div>
        </div>
    </div>
    
    </div>

<a href="javascript:void(0)" id="whatsapp-btn" class="floating-btn hidden" onclick="abrirModal()">
    <span class="cart-count" id="cart-count">0</span>
    <span class="btn-text">PEDIR POR WHATSAPP</span>
    <span class="total-amount" id="cart-total">S/ 0</span>
</a>

<div id="modal-registro" class="modal-overlay">
    <div class="modal-content">
        <div id="paso-1">
            <h2>¿Eres cliente de Alex Store?</h2>
            <button class="option-btn btn-antiguo" onclick="finalizarPedido('antiguo')">SÍ, YA SOY CLIENTE</button>
            <button class="option-btn btn-nuevo" onclick="mostrarFormulario()">NO, SOY CLIENTE NUEVO</button>
            <button style="background:transparent; color:grey; border:none; margin-top:10px;" onclick="cerrarModal()">Cancelar</button>
        </div>

        <div id="form-datos">
            <h2>Datos del Nuevo Cliente</h2>
            <div class="input-group">
                <label>Nombre Completo</label>
                <input type="text" id="reg-nombre" placeholder="Ej: Juan Pérez">
            </div>
            <div class="input-group">
                <label>Número de Celular</label>
                <input type="tel" id="reg-celular" placeholder="Ej: 918600000">
            </div>
            <div class="input-group">
                <label>Nombre del Perfil deseado</label>
                <input type="text" id="reg-perfil" placeholder="Ej: MiPerfil2026">
            </div>
            <button class="btn-confirmar" onclick="finalizarPedido('nuevo')">ENVIAR PEDIDO</button>
            <button style="background:transparent; color:grey; border:none; margin-top:10px; width:100%" onclick="volverPaso1()">Atrás</button>
        </div>
    </div>
</div>

<script>
    let carrito = [];
    const telefono = "51918600000";

    function toggleCarrito(elemento) {
        if(elemento.classList.contains('agotado')) return;
        const nombre = elemento.querySelector('.nombre-prod').innerText;
        const precioTexto = elemento.querySelector('.precio-prod').innerText;
        const precio = parseFloat(precioTexto.replace('S/', '').trim());
        const index = carrito.findIndex(item => item.nombre === nombre);
        
        if (index > -1) {
            carrito.splice(index, 1);
            elemento.classList.remove('selected');
        } else {
            if (carrito.length >= 2) {
                alert("⚠️ Para adquirir 3 o más servicios, por favor ingresa a nuestra sección de COMBOS.");
                return;
            }
            carrito.push({ nombre, precio });
            elemento.classList.add('selected');
        }
        actualizarInterfaz();
    }

    function actualizarInterfaz() {
        const btn = document.getElementById('whatsapp-btn');
        const countLabel = document.getElementById('cart-count');
        const totalLabel = document.getElementById('cart-total');
        let total = carrito.reduce((sum, item) => sum + item.precio, 0);
        let final = (carrito.length === 2) ? Math.round(total * 0.96) : total;

        countLabel.innerText = carrito.length;
        totalLabel.innerText = `S/ ${final}`;
        carrito.length > 0 ? btn.classList.remove('hidden') : btn.classList.add('hidden');
    }

    // LÓGICA DEL MODAL
    function abrirModal() {
        document.getElementById('modal-registro').style.display = 'flex';
    }

    function cerrarModal() {
        document.getElementById('modal-registro').style.display = 'none';
        volverPaso1();
    }

    function mostrarFormulario() {
        document.getElementById('paso-1').style.display = 'none';
        document.getElementById('form-datos').style.display = 'block';
    }

    function volverPaso1() {
        document.getElementById('paso-1').style.display = 'block';
        document.getElementById('form-datos').style.display = 'none';
    }

    function finalizarPedido(tipo) {
        let subtotal = carrito.reduce((sum, item) => sum + item.precio, 0);
        let final = (carrito.length === 2) ? Math.round(subtotal * 0.96) : subtotal;

        let mensaje = "Hola *Alex Store*, deseo contratar:\n\n";
        carrito.forEach(item => mensaje += `🔹 *${item.nombre}*\n`);
        mensaje += `\n💰 *TOTAL: S/ ${final}*`;

        if (tipo === 'nuevo') {
            const nom = document.getElementById('reg-nombre').value;
            const cel = document.getElementById('reg-celular').value;
            const per = document.getElementById('reg-perfil').value;

            if(!nom || !cel || !per) {
                alert("Por favor, completa todos los campos.");
                return;
            }
            mensaje += `\n\n👤 *DATOS CLIENTE NUEVO*:\n- Nombre: ${nom}\n- WhatsApp: ${cel}\n- Perfil: ${per}`;
        } else {
            mensaje += `\n\n✅ *YA SOY CLIENTE REGISTRADO*`;
        }

        window.open(`https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`, '_blank');
        cerrarModal();
    }
</script>
</body>
</html>
