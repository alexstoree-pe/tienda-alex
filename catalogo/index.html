<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alex Store | Premium Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00d4ff;
            --secondary: #0055ff;
            --dark: #020202;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --vip: #d4af37;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        /* Fondo Animado Sutil */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--secondary);
            filter: blur(150px);
            top: -100px;
            right: -100px;
            opacity: 0.2;
            z-index: -1;
        }

        .main-container {
            width: 95%;
            max-width: 500px;
            padding: 50px 30px;
            background: var(--glass);
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        .logo-section { margin-bottom: 50px; }
        
        .logo-section h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 6px;
            background: linear-gradient(to bottom, #fff 40%, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .logo-section p {
            font-size: 0.75rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 400;
            opacity: 0.8;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-access {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            padding: 30px 15px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            text-decoration: none;
            color: #fff;
        }

        .btn-access i {
            font-size: 1.8rem;
            margin-bottom: 5px;
            transition: 0.3s;
        }

        .btn-access span {
            font-size: 0.85rem;
            font-weight: 600;
            opacity: 0.9;
        }

        /* Efectos Hover Individuales */
        .btn-access:hover {
            background: rgba(255,255,255,0.05);
            transform: translateY(-5px);
            border-color: rgba(255,255,255,0.2);
        }

        .btn-clients:hover i { color: var(--primary); filter: drop-shadow(0 0 10px var(--primary)); }
        .btn-promos-c:hover i { color: #25d366; filter: drop-shadow(0 0 10px #25d366); }
        .btn-dist:hover i { color: var(--vip); filter: drop-shadow(0 0 10px var(--vip)); }
        .btn-promos-d:hover i { color: #ff4b2b; filter: drop-shadow(0 0 10px #ff4b2b); }

        /* Modal Estilo Apple */
        .modal-pass {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(25px);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            width: 85%;
            max-width: 350px;
            text-align: center;
        }

        #pass-input {
            width: 100%;
            background: none;
            border: none;
            border-bottom: 2px solid #333;
            color: #fff;
            font-size: 2rem;
            text-align: center;
            padding: 15px;
            margin: 30px 0;
            outline: none;
            letter-spacing: 10px;
            transition: 0.3s;
        }

        #pass-input:focus { border-bottom-color: var(--primary); }

        .btn-confirm {
            background: #fff;
            color: #000;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 800;
            border: none;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="logo-section">
        <h1>ALEX STORE</h1>
        <p>Digital Excellence</p>
    </div>

    <div class="buttons-grid">
        <div onclick="solicitarAcceso('clientes/')" class="btn-access btn-clients">
            <i class="fa-solid fa-layer-group"></i>
            <span>Catálogo</span>
        </div>
        <div onclick="solicitarAcceso('promociones-clientes/')" class="btn-access btn-promos-c">
            <i class="fa-solid fa-bolt"></i>
            <span>Ofertas</span>
        </div>
        <div onclick="solicitarAcceso('distribuidores/')" class="btn-access btn-dist">
            <i class="fa-solid fa-crown"></i>
            <span>Mayoristas</span>
        </div>
        <div onclick="solicitarAcceso('distribuidores-promos/')" class="btn-access btn-promos-d">
            <i class="fa-solid fa-gem"></i>
            <span>VIP Promos</span>
        </div>
    </div>
</div>

<div id="modal-pass" class="modal-pass">
    <div class="modal-content">
        <h2 id="modal-titulo">ACCESO</h2>
        <input type="password" id="pass-input" placeholder="****" maxlength="8">
        <button class="btn-confirm" onclick="validar()">CONTINUAR</button>
        <p onclick="cerrar()" style="margin-top:20px; font-size:0.8rem; color:#666; cursor:pointer;">Cancelar</p>
    </div>
</div>

<script>
    // Tu lógica de script se mantiene igual, solo ajusta los IDs si cambiaste algo
    let urlDestino = "";

    function solicitarAcceso(url) {
        urlDestino = url;
        document.getElementById('modal-pass').style.display = 'flex';
        document.getElementById('pass-input').focus();
    }

    function cerrar() { document.getElementById('modal-pass').style.display = 'none'; }

    function validar() {
        const pass = document.getElementById('pass-input').value;
        if (pass === "cliente" || pass === "dis") {
            window.location.href = urlDestino;
        } else {
            alert("Código Incorrecto");
        }
    }
</script>

</body>
</html>
